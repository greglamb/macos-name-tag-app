name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: |
          xcodebuild \
            -project NameTag.xcodeproj \
            -scheme NameTag \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Run Tests
        run: |
          xcodebuild \
            -project NameTag.xcodeproj \
            -scheme NameTag \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Verify app bundle
        run: |
          APP_PATH="build/Build/Products/Debug/NameTag.app"
          test -d "$APP_PATH" || { echo "App bundle not found"; exit 1; }
          echo "Build successful: $APP_PATH"
